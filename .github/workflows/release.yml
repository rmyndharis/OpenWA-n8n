name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: node

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to mint the OIDC token for the npm provenance attestation
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run lint
      # Block the publish if the source fails the n8n Creator Portal lint gate (same
      # ruleset the portal runs). Installed in isolation — its TypeScript 7 / ESLint 9
      # toolchain conflicts with this project's devDeps and must not be a dependency.
      - name: n8n community-node scan (Creator Portal ruleset)
        run: |
          tmp=$(mktemp -d)
          (cd "$tmp" && npm init -y >/dev/null && npm i @n8n/scan-community-package@beta >/dev/null)
          N8N_SCANNER_PATH="$tmp/node_modules/@n8n/scan-community-package/scanner/scanner.mjs" \
            node scripts/n8n-scan.mjs
      - run: npm run build
      - run: node --test test/*.test.mjs
      # --provenance attaches a signed build attestation, required for n8n community-node
      # verification since May 2026. Works with NPM_TOKEN below; for OIDC trusted publishing,
      # remove NPM_TOKEN and configure a Trusted Publisher on npm (no long-lived secret).
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
