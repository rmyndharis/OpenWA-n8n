name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Fail if the committed dist/ is stale relative to src/ — GitHub installs serve
      # the committed dist/ verbatim, so it must always match the build of src/.
      - name: Verify committed dist/ matches source
        run: git diff --exit-code -- dist
      - run: node --test test/*.test.mjs
