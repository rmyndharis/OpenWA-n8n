name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      # Run the same lint gate the n8n Creator Portal enforces, against the local
      # source, so a rule violation fails CI before publishing instead of after the
      # portal rejects the release. The scanner's toolchain (TypeScript 7, ESLint 9)
      # conflicts with this project's devDeps, so install it in isolation — never as
      # a dependency — and point the script at it.
      - name: n8n community-node scan (Creator Portal ruleset)
        run: |
          tmp=$(mktemp -d)
          # --ignore-scripts: the scanner pulls in a native module (isolated-vm) it never uses
          # for linting; skipping its node-gyp build keeps the install off Node's version quirks.
          (cd "$tmp" && npm init -y >/dev/null && npm i --ignore-scripts @n8n/scan-community-package@beta >/dev/null)
          N8N_SCANNER_PATH="$tmp/node_modules/@n8n/scan-community-package/scanner/scanner.mjs" \
            node scripts/n8n-scan.mjs
      - run: npm run build
      # Fail if the committed dist/ is stale relative to src/ — GitHub installs serve
      # the committed dist/ verbatim, so it must always match the build of src/.
      - name: Verify committed dist/ matches source
        run: git diff --exit-code -- dist
      - run: node --test test/*.test.mjs
